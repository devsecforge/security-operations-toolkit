name: 🐛 Bug Report
description: Report a problem with a script or the CI pipeline
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make sca`
        2. See error ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, tool versions (trivy/semgrep/gitleaks --version)"
    validations:
      required: true
